version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nasunest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-${MYSQL_DATABASE:-nasunest}}
      POSTGRES_USER: ${DB_USER:-${MYSQL_USER:-app_user}}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-${MYSQL_PASSWORD:-app_password}}
    ports:
      - "${DB_PORT:-${MYSQL_PORT:-5432}}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nasunest-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      # ホスト側ポートは衝突しやすいのでデフォルトをずらす（必要ならPGADMIN_PORTで上書き）
      - "${PGADMIN_PORT:-8081}:80"
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
